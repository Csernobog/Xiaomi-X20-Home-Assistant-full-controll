type: custom:expander-card
title: Expander Card
cards:
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            icon: mdi:sofa
            entity: input_boolean.room_9
            styles:
              card:
                - font-size: 10px
                - font-weight: bold
            state:
              - value: "on"
                styles:
                  icon:
                    - color: "#39FF14"
                  name:
                    - color: "#39FF14"
                  card:
                    - box-shadow: 0 0 10px
              - value: "off"
                styles:
                  icon:
                    - color: rgb(28, 128, 210)
          - type: custom:button-card
            icon: mdi:silverware-fork-knife
            entity: input_boolean.room_4
            styles:
              card:
                - font-size: 10px
                - font-weight: bold
